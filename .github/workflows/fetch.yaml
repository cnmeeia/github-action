name: Fetch latest supezen tweet

on:
  schedule:
    - cron: "0 * * * *"     # 每小时跑一次（UTC）
  workflow_dispatch: {}

jobs:
  fetch-latest-supezen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests directly
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download x-tweet-fetcher
        run: |
          # 直接从 GitHub 下载项目需要的 fetch_tweet.py
          curl -L -o scripts/fetch_tweet.py \
            https://raw.githubusercontent.com/ythx-101/x-tweet-fetcher/main/scripts/fetch_tweet.py
          mkdir -p scripts

      - name: Run fetch latest supezen
        env:
          SUPEZEN_URL: "https://x.com/supezen"
        run: |
          python scripts/fetch_latest_supezen.py
          cat latest-supezen.json

      - name: Commit result (optional)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-supezen.json
          git commit -m "update supezen latest tweet" || echo "no changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
