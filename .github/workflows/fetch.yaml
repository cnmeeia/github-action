name: Fetch latest supezen tweet

on:
  schedule:
    # 每小时跑一次（UTC）。你在新加坡（UTC+8），可以按需要调 cron。
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  fetch-latest-supezen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest supezen tweet
        env:
          SUPEZEN_URL: "https://x.com/supezen?s=21"
        run: |
          python scripts/fetch_latest_supezen.py
          cat latest-supezen.json

      # 如果你想把 latest-supezen.json 提交回仓库，打开下面这段
      - name: Commit and push changes
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest-supezen.json
          git commit -m "chore: update latest supezen tweet" || echo "no changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
