name: Fetch X List Daily (Lite)

on:
  schedule:
    - cron: "0 6 * * *"   # 每天 UTC 06:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download fetch script only
        run: |
          curl -L -o fetch_tweet.py \
          https://raw.githubusercontent.com/ythx-101/x-tweet-fetcher/main/scripts/fetch_tweet.py

      - name: Run fetcher
        run: |
          TODAY=$(date +'%Y-%m-%d')
          mkdir -p data/$TODAY

          python3 fetch_tweet.py \
            --list https://x.com/i/lists/1936720569468338504 \
            --limit 50 \
            > data/$TODAY/tweets.json

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/
          git commit -m "Update $(date +'%Y-%m-%d')" || echo "No changes"
          git push