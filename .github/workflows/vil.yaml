name: 更新 BLACK VLESS 配置

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-config:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载原始 VLESS 配置
        run: |
          URL="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Base64/BLACK_VLESS_RUS_base64.txt"
          OUTPUT_FILE="original.txt"

          echo "正在下载最新配置..."

          curl -fsSL "$URL" -o raw.txt || {
            echo "下载失败"
            exit 1
          }

          # 检查是否为 Base64
          if head -1 raw.txt | grep -qE '^[A-Za-z0-9+/=]+$'; then
            echo "检测到 Base64 编码，正在解码..."

            base64 -d raw.txt > "$OUTPUT_FILE" 2>/dev/null || {
              echo "Base64 解码失败"
              exit 1
            }
          else
            echo "文件已是明文格式"
            mv raw.txt "$OUTPUT_FILE"
          fi

          # 检查文件是否为空
          if [ ! -s "$OUTPUT_FILE" ]; then
            echo "文件为空"
            exit 1
          fi

          echo "✅ 下载并解码完成"

      - name: 调用处理脚本
        run: |
          chmod +x scripts/process_vless.sh

          ./scripts/process_vless.sh \
            original.txt \
            BLACK_VLESS_RUS_clean.txt

      - name: 提交并推送更新
        run: |
          OUTPUT_FILE="BLACK_VLESS_RUS_clean.txt"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 强制制造变更
          echo "更新时间: $(date '+%Y-%m-%d %H:%M:%S')" > .last_update

          git add "$OUTPUT_FILE" .last_update

          # 如果已有提交则覆盖
          if git rev-parse HEAD >/dev/null 2>&1; then
            git commit --amend --no-edit
          else
            git commit -m "初始化提交"
          fi

          # 强制推送
          git push origin HEAD --force

          echo "✅ 已覆盖更新并推送"