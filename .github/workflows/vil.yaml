```yaml
name: 更新 BLACK VLESS 配置

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-config:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载并处理 VLESS 配置
        run: |
          URL="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Base64/BLACK_VLESS_RUS_base64.txt"
          OUTPUT_FILE="BLACK_VLESS_RUS_clean.txt"

          echo "正在下载最新配置..."

          curl -sL "$URL" -o original.txt

          if [ ! -s original.txt ]; then
            echo "下载失败或文件为空"
            exit 1
          fi

          echo "开始处理配置..."

          awk '
          BEGIN {
              flags["Czechia"]="🇨🇿";
              flags["Czech Republic"]="🇨🇿";
              flags["Finland"]="🇫🇮";
              flags["France"]="🇫🇷";
              flags["Germany"]="🇩🇪";
              flags["Hong Kong"]="🇭🇰";
              flags["Kazakhstan"]="🇰🇿";
              flags["Lithuania"]="🇱🇹";
              flags["Singapore"]="🇸🇬";
              flags["Switzerland"]="🇨🇭";
              flags["Netherlands"]="🇳🇱";
              flags["The Netherlands"]="🇳🇱";
              flags["Turkey"]="🇹🇷";
              flags["United Kingdom"]="🇬🇧";
              flags["UK"]="🇬🇧";
              flags["United States"]="🇺🇸";
              flags["USA"]="🇺🇸";
          }

          /^vless:/// {

              full = $0

              alias = "Unknown"

              pos = index(full, "#")

              if (pos > 0) {
                  alias = substr(full, pos + 1)
                  full = substr(full, 1, pos - 1)
              }

              gsub(/^[ \t]+|[ \t]+$/, "", alias)

              country = "Unknown"
              city = alias

              n = split(alias, arr, " ")

              if (n >= 2) {

                  country = arr[1]
                  city = arr[2]

                  if (arr[1] == "Hong" && arr[2] == "Kong") {
                      country = "Hong Kong"
                      city = arr[3]
                  }

                  if (arr[1] == "United" && arr[2] == "States") {
                      country = "United States"
                      city = arr[3]
                  }

                  if (arr[1] == "United" && arr[2] == "Kingdom") {
                      country = "United Kingdom"
                      city = arr[3]
                  }

                  if (arr[1] == "Czech" && arr[2] == "Republic") {
                      country = "Czech Republic"
                      city = arr[3]
                  }

                  if (arr[1] == "The" && arr[2] == "Netherlands") {
                      country = "The Netherlands"
                      city = arr[3]
                  }
              }

              if (city == "" || city == " ") {
                  city = "Unknown"
              }

              key = country "|" city
              count[key]++

              flag = "🌍"

              if (country in flags) {
                  flag = flags[country]
              }

              if (count[key] == 1) {
                  name = flag " " city
              } else {
                  name = flag " " city " " count[key]
              }

              output = full "#" name

              # 自动去重
              if (!seen[output]++) {
                  print output
              }
          }
          ' original.txt > "$OUTPUT_FILE"

          NODE_COUNT=$(grep -c "^vless://" "$OUTPUT_FILE")

          echo "处理完成，共 ${NODE_COUNT} 个节点"

      - name: 提交并推送更新
        run: |
          OUTPUT_FILE="BLACK_VLESS_RUS_clean.txt"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"

          if git diff --cached --quiet; then
            echo "配置没有变化，跳过提交"
          else
            git commit -m "🔄 自动更新 VLESS 配置 $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin HEAD
            echo "✅ 已成功更新并推送"