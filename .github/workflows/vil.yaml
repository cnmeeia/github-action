name: 更新 BLACK VLESS 配置

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-config:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载并处理 VLESS 配置
        run: |
          URL="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Base64/BLACK_VLESS_RUS_base64.txt"
          OUTPUT_FILE="BLACK_VLESS_RUS_clean.txt"

          echo "正在下载最新配置..."
          curl -fsSL "$URL" -o raw.txt || { echo "下载失败"; exit 1; }

          # 检查是否是 Base64 编码
          if head -1 raw.txt | grep -qE '^[A-Za-z0-9+/=]+$'; then
            echo "检测到 Base64 编码，正在解码..."
            base64 -d raw.txt > original.txt 2>/dev/null || { echo "Base64 解码失败"; exit 1; }
          else
            echo "文件已是明文格式"
            mv raw.txt original.txt
          fi

          if [ ! -s original.txt ]; then
            echo "文件为空"
            exit 1
          fi

          echo "开始处理配置..."

          awk '
          BEGIN {
              # 国旗映射（完善版）
              flags["Albania"]="🇦🇱";
              flags["Australia"]="🇦🇺";
              flags["Austria"]="🇦🇹";
              flags["Belgium"]="🇧🇪";
              flags["Brazil"]="🇧🇷";
              flags["Bulgaria"]="🇧🇬";
              flags["Canada"]="🇨🇦";
              flags["Czechia"]="🇨🇿";
              flags["Czech Republic"]="🇨🇿";
              flags["Denmark"]="🇩🇰";
              flags["Egypt"]="🇪🇬";
              flags["Estonia"]="🇪🇪";
              flags["Finland"]="🇫🇮";
              flags["France"]="🇫🇷";
              flags["Germany"]="🇩🇪";
              flags["Greece"]="🇬🇷";
              flags["Hong Kong"]="🇭🇰";
              flags["Hungary"]="🇭🇺";
              flags["Iceland"]="🇮🇸";
              flags["India"]="🇮🇳";
              flags["Indonesia"]="🇮🇩";
              flags["Ireland"]="🇮🇪";
              flags["Israel"]="🇮🇱";
              flags["Italy"]="🇮🇹";
              flags["Japan"]="🇯🇵";
              flags["Kazakhstan"]="🇰🇿";
              flags["Latvia"]="🇱🇻";
              flags["Lithuania"]="🇱🇹";
              flags["Luxembourg"]="🇱🇺";
              flags["Malaysia"]="🇲🇾";
              flags["Netherlands"]="🇳🇱";
              flags["The Netherlands"]="🇳🇱";
              flags["New Zealand"]="🇳🇿";
              flags["Norway"]="🇳🇴";
              flags["Philippines"]="🇵🇭";
              flags["Poland"]="🇵🇱";
              flags["Portugal"]="🇵🇹";
              flags["Romania"]="🇷🇴";
              flags["Saudi Arabia"]="🇸🇦";
              flags["Serbia"]="🇷🇸";
              flags["Singapore"]="🇸🇬";
              flags["Slovakia"]="🇸🇰";
              flags["Slovenia"]="🇸🇮";
              flags["South Africa"]="🇿🇦";
              flags["South Korea"]="🇰🇷";
              flags["Spain"]="🇪🇸";
              flags["Sweden"]="🇸🇪";
              flags["Switzerland"]="🇨🇭";
              flags["Taiwan"]="🇹🇼";
              flags["Thailand"]="🇹🇭";
              flags["Turkey"]="🇹🇷";
              flags["Ukraine"]="🇺🇦";
              flags["United Arab Emirates"]="🇦🇪";
              flags["United Kingdom"]="🇬🇧";
              flags["UK"]="🇬🇧";
              flags["United States"]="🇺🇸";
              flags["USA"]="🇺🇸";
              flags["Vietnam"]="🇻🇳";

              # 常见多词国家的识别
              multi_word["Hong Kong"]="Hong Kong"
              multi_word["United States"]="United States"
              multi_word["United Kingdom"]="United Kingdom"
              multi_word["Czech Republic"]="Czech Republic"
              multi_word["The Netherlands"]="The Netherlands"
              multi_word["South Korea"]="South Korea"
              multi_word["Saudi Arabia"]="Saudi Arabia"
              multi_word["South Africa"]="South Africa"
              multi_word["New Zealand"]="New Zealand"
              multi_word["United Arab Emirates"]="United Arab Emirates"
          }

          # 匹配 vless:// 开头的行（可能被包裹在引号或其他字符中）
          {
              line = $0
              while (match(line, /vless:\/\/[^[:space:]]+/)) {
                  full = substr(line, RSTART, RLENGTH)
                  line = substr(line, RSTART + RLENGTH)

                  # 提取别名
                  alias = "Unknown"
                  pos = index(full, "#")
                  if (pos > 0) {
                      alias = substr(full, pos + 1)
                      full = substr(full, 1, pos - 1)
                  }

                  # URL 解码别名（处理 %20 等）
                  gsub(/\+/, " ", alias)
                  gsub(/%20/, " ", alias)
                  gsub(/%23/, "#", alias)
                  gsub(/%2F/, "/", alias)

                  gsub(/^[ \t]+|[ \t]+$/, "", alias)

                  # 智能解析国家/城市
                  country = ""
                  city = ""

                  # 先检查多词国家
                  found = 0
                  for (mw in multi_word) {
                      if (index(alias, mw) == 1) {
                          country = mw
                          rest = substr(alias, length(mw) + 1)
                          gsub(/^[ \t]+/, "", rest)
                          # 提取城市（第一个单词）
                          split(rest, parts, " ")
                          city = parts[1]
                          found = 1
                          break
                      }
                  }

                  # 普通两词格式："国家 城市"
                  if (!found && match(alias, /^[A-Za-z]+ [A-Za-z]/)) {
                      split(alias, parts, " ")
                      country = parts[1]
                      city = parts[2]
                  }

                  # 单词格式：只有城市名
                  if (!found && country == "") {
                      city = alias
                  }

                  # 清理城市名
                  gsub(/[^A-Za-z\u4e00-\u9fa5-]/, "", city)
                  if (city == "") city = "Server"

                  # 获取国旗
                  flag = "🌍"
                  if (country in flags) flag = flags[country]
                  if (country == "") flag = "🌍"

                  # 处理重复城市
                  key = (country == "" ? city : country "|" city)
                  count[key]++

                  if (count[key] > 1) {
                      name = flag " " city " " count[key]
                  } else {
                      name = flag " " city
                  }

                  output = full "#" name

                  if (!seen[output]++) {
                      print output
                  }
              }
          }
          ' original.txt > "$OUTPUT_FILE"

          NODE_COUNT=$(grep -c "^vless://" "$OUTPUT_FILE" 2>/dev/null || echo 0)
          echo "处理完成，共 ${NODE_COUNT} 个节点"

          if [ "$NODE_COUNT" -eq 0 ]; then
            echo "❌ 错误：没有提取到任何有效节点"
            exit 1
          fi

      - name: 提交并推送更新
        run: |
          OUTPUT_FILE="BLACK_VLESS_RUS_clean.txt"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$OUTPUT_FILE"

          if git diff --cached --quiet; then
            echo "📭 配置没有变化，跳过提交"
          else
            git commit -m "🔄 自动更新 VLESS 配置 ($(date '+%Y-%m-%d %H:%M:%S'))"
            git push origin HEAD
            echo "✅ 已成功更新并推送"
          fi

      - name: 上传配置为 Artifact（可选）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vless-config
          path: BLACK_VLESS_RUS_clean.txt
          retention-days: 3