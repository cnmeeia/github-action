name: Build Latest claw-code

on:
  workflow_dispatch:      # 手动运行
  schedule:
    - cron: "0 */6 * * *" # 每6小时自动编译一次（可改）

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install git
      run: sudo apt-get update && sudo apt-get install -y git

    - name: Clone latest claw-code
      run: |
        git clone --depth=1 https://github.com/ultraworkers/claw-code.git
        cd claw-code
        git pull

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build release
      run: |
        cd claw-code/rust
        cargo build --release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: claw-code-latest
        path: claw-code/rust/target/release/