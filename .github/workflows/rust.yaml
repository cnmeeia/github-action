name: Build claw-code from ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install unzip
      run: sudo apt-get update && sudo apt-get install -y unzip wget

    - name: Download ZIP
      run: wget https://github.com/ultraworkers/claw-code/archive/refs/heads/main.zip -O claw-code.zip

    - name: Unzip
      run: unzip claw-code.zip

    - name: Build Rust project
      run: |
        cd claw-code-main/rust
        cargo build --release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: claw-code-release
        path: claw-code-main/rust/target/release/